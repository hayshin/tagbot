name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v11

      - name: Build Binary and Docker Image
        run: |
          # Build the binary for the GitHub Release
          nix build .#default -o result-bin
          # Build the Docker image (Nix reuses the binary build from above)
          nix build .#dockerImage -o result-docker

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: result-bin/bin/tagbot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, Tag and Push Docker Image
        run: |
          docker load < result-docker
          
          IMAGE_NAME=ghcr.io/${{ github.repository }}
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          TAG_LATEST=$IMAGE_NAME:latest
          TAG_VERSION=$IMAGE_NAME:${{ github.ref_name }}
          
          docker tag tagbot:latest $TAG_LATEST
          docker tag tagbot:latest $TAG_VERSION
          
          docker push $TAG_LATEST
          docker push $TAG_VERSION
