name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v11

      - name: Build Binary and Docker Image
        run: |
          set -euo pipefail
          # Build the binary for the GitHub Release
          # Build the Docker image (Nix reuses the binary build from above)
          nix build .#default .#dockerImage -o result-bin -o result-docker

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: result-bin/bin/tagbot

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, Tag and Push Docker Image
        run: |
          set -euo pipefail
          LOADED_IMAGE=$(docker load < result-docker | awk '/Loaded image:/ {print $3}')
          if [ -z "$LOADED_IMAGE" ]; then
            echo "Failed to detect loaded image name from docker load output" >&2
            exit 1
          fi

          IMAGE_NAME=ghcr.io/${{ github.repository }}
          IMAGE_NAME=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          TAG_LATEST=$IMAGE_NAME:latest
          TAG_VERSION=$IMAGE_NAME:${{ github.ref_name }}
          
          docker tag "$LOADED_IMAGE" "$TAG_LATEST"
          docker tag "$LOADED_IMAGE" "$TAG_VERSION"
          
          docker push "$TAG_LATEST"
          docker push "$TAG_VERSION"
